cmd_thrust:
    type: sensor_msgs/JointState
    t1:
        min: -40
        max: 40
        to: effort[0]
    t2:
        min: -40
        max: 40
        to: effort[1]
    t3:
        min: -40
        max: 40
        to: effort[2]
    t4:
        min: -40
        max: 40
        to: effort[3]
    t5:
        min: -40
        max: 40
        to: effort[4]
    t6:
        min: -40
        max: 40
        to: effort[5]
/blurr/cmd_tilt:
    type: std_msgs/Float32
    angle:
        min: -pi/3
        max: pi/3
/blurr/cmd_light:
    type: std_msgs/Float32
    intensity:
        min: 0.
        max: 1.
        default: 0.
